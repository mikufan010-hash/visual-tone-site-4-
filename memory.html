<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory — Visual Tone</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f3ee;
  --surface: #fff;
  --rule: #d8d5ce;
  --rule2: rgba(0,0,0,0.12);
  --ink: #111;
  --muted: #999;
  --mono: 'DM Mono', monospace;
  --serif: 'Instrument Serif', serif;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 13px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  border-bottom: 1px solid var(--rule);
  padding: 0 28px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

.logo { font-family: var(--serif); font-style: italic; font-size: 20px; color: var(--ink); text-decoration: none; }
.logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-left: 14px; }

.score-bar {
  display: flex;
  gap: 8px;
}

.pill {
  background: var(--bg);
  border: 1px solid var(--rule2);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 11px;
  color: var(--ink);
  letter-spacing: 0.04em;
}

.pill span { color: var(--muted); margin-right: 4px; }

main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  padding: 40px;
  gap: 60px;
  max-width: 1000px;
  margin: 0 auto;
  width: 100%;
}

/* DEMO ANIMATION */
.demo-wrap {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.demo-tiles {
  display: flex;
  gap: 10px;
  justify-content: center;
  min-height: 140px;
  align-items: flex-end;
}

.demo-tile {
  width: 80px;
  height: 120px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 10px;
  opacity: 0;
  transform: translateY(16px) scale(0.92);
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

.demo-tile.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.demo-tile.hidden {
  opacity: 0;
  transform: translateY(-12px) scale(0.9);
}

.demo-tile-hex {
  font-size: 9px;
  letter-spacing: 0.04em;
  opacity: 0.7;
}

.demo-question {
  display: flex;
  gap: 10px;
  justify-content: center;
  min-height: 80px;
  align-items: center;
}

.demo-q-tile {
  width: 60px;
  height: 80px;
  border-radius: 8px;
  border: 2px dashed rgba(0,0,0,0.15);
  background: rgba(255,255,255,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--muted);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.demo-q-tile.visible { opacity: 1; }

.demo-q-tile.found {
  border-style: solid;
  border-color: rgba(46,125,50,0.5);
}

.demo-phase-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
  min-height: 14px;
  transition: opacity 0.3s;
}

.phase-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
  min-height: 16px;
}

/* COUNTDOWN */
.countdown {
  font-family: var(--serif);
  font-style: italic;
  font-size: 80px;
  color: var(--ink);
  line-height: 1;
  min-height: 80px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.3s;
}

.countdown.visible { opacity: 1; }

/* COLOR DETAIL OVERLAY */
.color-detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(245,243,238,0.92);
  backdrop-filter: blur(8px);
  z-index: 500;
  overflow-y: auto;
  padding: 40px 24px;
  display: flex;
  justify-content: center;
}

.color-detail-box {
  max-width: 560px;
  width: 100%;
}

.color-detail-hero {
  height: 120px;
  border-radius: 12px;
  display: flex;
  align-items: flex-end;
  padding: 16px 20px;
  margin-bottom: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.color-detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

.detail-sec-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.chip-row {
  display: flex;
  gap: 4px;
}

.chip {
  flex: 1;
  height: 44px;
  border-radius: 4px;
  cursor: pointer;
  transition: transform 0.1s;
  position: relative;
}
.chip:hover { transform: scaleY(1.06); }
.chip:hover::after {
  content: attr(data-hex);
  position: absolute;
  bottom: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: var(--muted);
  white-space: nowrap;
}

.shades-strip {
  display: flex;
  gap: 2px;
}

.shade {
  flex: 1;
  height: 32px;
  border-radius: 2px;
}

.color-display {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.color-tile {
  width: 120px;
  height: 160px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 14px;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
  transform: translateY(20px);
  opacity: 0;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}

.color-tile.visible {
  transform: translateY(0);
  opacity: 1;
}

.color-tile.hidden-tile {
  background: var(--surface) !important;
  border: 2px dashed var(--rule2);
  align-items: center;
  justify-content: center;
}

.tile-hex {
  font-size: 11px;
  letter-spacing: 0.04em;
  opacity: 0.7;
}

/* CHOICE GRID */
.choice-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  max-width: 680px;
  width: 100%;
}

.choice-tile {
  aspect-ratio: 1;
  border-radius: 10px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  position: relative;
}

.choice-tile:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
.choice-tile.correct { border-color: #2e7d32; box-shadow: 0 0 0 3px rgba(46,125,50,0.3); }
.choice-tile.wrong   { border-color: #c0392b; box-shadow: 0 0 0 3px rgba(192,57,43,0.3); animation: shake 0.3s ease; }
.choice-tile.missed  { border-color: #f0a500; box-shadow: 0 0 0 3px rgba(240,165,0,0.3); }
.choice-tile.disabled { cursor: default; }
.choice-tile:hover.disabled { transform: none; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.choice-label {
  position: absolute;
  bottom: 6px; left: 0; right: 0;
  text-align: center;
  font-size: 9px;
  letter-spacing: 0.04em;
  opacity: 0.6;
}

/* RESULT */
.result-msg {
  font-family: var(--serif);
  font-style: italic;
  font-size: 32px;
  text-align: center;
  min-height: 40px;
  color: var(--ink);
}

/* BUTTON */
.btn {
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 12px 28px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn:hover { opacity: 0.8; }
.btn.secondary {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--rule2);
}

.btn-row { display: flex; gap: 10px; justify-content: center; }

/* DIFFICULTY */
.diff-row {
  display: flex;
  gap: 6px;
}
.diff-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--rule2);
  background: var(--bg);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.12s;
}
.diff-btn:hover { border-color: var(--ink); color: var(--ink); }
.diff-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

/* PROGRESS DOTS */
.progress-dots {
  display: flex;
  gap: 8px;
  justify-content: center;
}
.prog-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--rule2);
  transition: background 0.2s;
}
.prog-dot.done { background: #2e7d32; }
.prog-dot.wrong-dot { background: #c0392b; }
.prog-dot.current { background: var(--ink); }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;">
    <a class="logo" href="index.html">Visual Tone</a>
    <span class="logo-sub">Memory</span>
  </div>
  <div class="score-bar">
    <div class="pill"><span>Round</span><span id="roundDisp">1</span></div>
    <div class="pill"><span>Score</span><span id="scoreDisp">0</span></div>
    <div class="pill"><span>Best</span><span id="bestDisp">0</span></div>
  </div>
</header>

<main id="main">

  <div>
    <div style="font-family:var(--serif);font-style:italic;font-size:42px;margin-bottom:12px;">Color Memory</div>
    <div style="font-size:12px;color:var(--muted);line-height:1.8;max-width:320px;margin-bottom:28px;">
      Memorize the palette, then find the colors from a grid of distractors.
    </div>
    <div style="margin-bottom:20px;">
      <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;">Difficulty</div>
      <div class="diff-row">
        <button class="diff-btn" data-colors="2" data-choices="8"  data-time="3">Easy</button>
        <button class="diff-btn active" data-colors="4" data-choices="12" data-time="3">Normal</button>
        <button class="diff-btn" data-colors="5" data-choices="16" data-time="2">Hard</button>
        <button class="diff-btn" data-colors="6" data-choices="20" data-time="2">Brutal</button>
      </div>
    </div>
    <div class="btn-row" style="justify-content:flex-start;">
      <button class="btn" id="startBtn">Start →</button>
    </div>
  </div>

  <!-- DEMO -->
  <div class="demo-wrap">
    <div class="demo-phase-label" id="demoPhaseLabel">Memorize these colors</div>
    <div class="demo-tiles" id="demoTiles"></div>
    <div class="demo-question" id="demoQuestion"></div>
  </div>

</main>

<script>
// ── COLOR DETAIL ──
function hexToHsl(hex) {
  let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}
  else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}}
  return [Math.round(h*360),Math.round(s*100),Math.round(l*100)];
}

function showColorDetail(hex) {
  const [h,s,l] = hexToHsl(hex);
  const textColor = l > 55 ? '#111' : '#f5f3ee';
  const mutedColor = l > 55 ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.5)';

  const complementary = [hslToHex((h+180)%360,s,l)];
  const analogous     = [hslToHex((h+30)%360,s,l), hslToHex((h+330)%360,s,l)];
  const triadic       = [hslToHex((h+120)%360,s,l), hslToHex((h+240)%360,s,l)];
  const splitComp     = [hslToHex((h+150)%360,s,l), hslToHex((h+210)%360,s,l)];
  const saturations   = [10,25,40,55,70,85,95].map(st=>hslToHex(h,st,l));
  const tints         = [15,25,35,45,55,65,75,85,93].map(lt=>hslToHex(h,s,lt));
  const shades        = [93,85,75,65,55,45,35,25,15].map(lt=>hslToHex(h,s,lt));

  const chipRow = (colors, includeBase=true) => {
    const all = includeBase ? [hex,...colors] : colors;
    return `<div class="chip-row">${all.map(c=>`<div class="chip" style="background:${c};" data-hex="${c}" title="${c}"></div>`).join('')}</div>`;
  };

  const overlay = document.createElement('div');
  overlay.className = 'color-detail-overlay';
  overlay.innerHTML = `
    <div class="color-detail-box">
      <button class="btn secondary" id="detailClose" style="margin-bottom:20px;">← Back</button>

      <div class="color-detail-hero" style="background:${hex};">
        <div>
          <div style="font-family:var(--serif);font-style:italic;font-size:32px;color:${textColor};">${hex}</div>
          <div style="font-size:11px;color:${mutedColor};margin-top:4px;">hsl(${h}, ${s}%, ${l}%)</div>
        </div>
      </div>

      <div class="color-detail-grid">
        <div>
          <div class="detail-sec-label">Complementary</div>
          ${chipRow(complementary)}
        </div>
        <div>
          <div class="detail-sec-label">Analogous</div>
          ${chipRow(analogous)}
        </div>
        <div>
          <div class="detail-sec-label">Triadic</div>
          ${chipRow(triadic)}
        </div>
        <div>
          <div class="detail-sec-label">Split Complementary</div>
          ${chipRow(splitComp)}
        </div>
        <div>
          <div class="detail-sec-label">Saturation range</div>
          ${chipRow(saturations, false)}
        </div>
        <div style="grid-column:1/-1;">
          <div class="detail-sec-label">Tints → Shades</div>
          <div class="shades-strip">
            ${tints.map(c=>`<div class="shade" style="background:${c};" title="${c}"></div>`).join('')}
            <div class="shade" style="background:${hex};outline:2px solid #111;outline-offset:-2px;" title="${hex}"></div>
            ${shades.map(c=>`<div class="shade" style="background:${c};" title="${c}"></div>`).join('')}
          </div>
        </div>

        <div style="grid-column:1/-1;margin-top:8px;">
          <div class="detail-sec-label">Color wheel</div>
          <div style="display:flex;justify-content:center;padding:8px 0;">
            <canvas id="colorWheelCanvas" width="240" height="240" style="border-radius:50%;"></canvas>
          </div>
        </div>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
  document.getElementById('detailClose').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });

  // Draw color wheel
  const canvas = document.getElementById('colorWheelCanvas');
  const ctx2 = canvas.getContext('2d');
  const cx = 120, cy = 120, r = 110;

  // Draw hue ring
  for(let angle=0; angle<360; angle++){
    const startA = (angle-1) * Math.PI/180;
    const endA = (angle+1) * Math.PI/180;
    // outer ring (full sat)
    const grad = ctx2.createRadialGradient(cx,cy,r*0.45,cx,cy,r);
    grad.addColorStop(0, `hsla(${angle},0%,50%,1)`);
    grad.addColorStop(1, `hsla(${angle},100%,50%,1)`);
    ctx2.beginPath();
    ctx2.moveTo(cx,cy);
    ctx2.arc(cx,cy,r,startA,endA);
    ctx2.closePath();
    ctx2.fillStyle = `hsl(${angle},100%,50%)`;
    ctx2.fill();
  }

  // White center fade
  const fade = ctx2.createRadialGradient(cx,cy,0,cx,cy,r*0.5);
  fade.addColorStop(0,'rgba(255,255,255,1)');
  fade.addColorStop(1,'rgba(255,255,255,0)');
  ctx2.beginPath();
  ctx2.arc(cx,cy,r,0,Math.PI*2);
  ctx2.fillStyle = fade;
  ctx2.fill();

  // Draw dot function
  function drawDot(hue, sat, label, size=10, color='#111') {
    const angle = (hue - 90) * Math.PI/180;
    const dist = r * 0.45 + (r * 0.5) * (sat/100);
    const x = cx + Math.cos(angle) * dist;
    const y = cy + Math.sin(angle) * dist;
    ctx2.beginPath();
    ctx2.arc(x,y,size,0,Math.PI*2);
    ctx2.fillStyle = color;
    ctx2.fill();
    ctx2.strokeStyle = '#fff';
    ctx2.lineWidth = 2;
    ctx2.stroke();
    if(label){
      ctx2.fillStyle = '#111';
      ctx2.font = 'bold 9px DM Mono, monospace';
      ctx2.textAlign = 'center';
      ctx2.fillText(label, x, y - size - 4);
    }
  }

  // Draw relationship dots with lines
  const relColors = [
    { hue:(h+180)%360, label:'C', title:'Complementary' },
    { hue:(h+120)%360, label:'T1', title:'Triadic' },
    { hue:(h+240)%360, label:'T2', title:'Triadic' },
    { hue:(h+30)%360,  label:'A+', title:'Analogous' },
    { hue:(h+330)%360, label:'A−', title:'Analogous' },
  ];

  // Draw lines from center color to relationships
  const mainAngle = (h - 90) * Math.PI/180;
  const mainDist = r * 0.45 + (r * 0.5) * (s/100);
  const mx = cx + Math.cos(mainAngle)*mainDist;
  const my = cy + Math.sin(mainAngle)*mainDist;

  relColors.forEach(rc => {
    const ra = (rc.hue - 90)*Math.PI/180;
    const rd = r * 0.45 + (r*0.5)*(s/100);
    const rx = cx + Math.cos(ra)*rd;
    const ry = cy + Math.sin(ra)*rd;
    ctx2.beginPath();
    ctx2.moveTo(mx,my);
    ctx2.lineTo(rx,ry);
    ctx2.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx2.lineWidth = 1;
    ctx2.setLineDash([3,3]);
    ctx2.stroke();
    ctx2.setLineDash([]);
  });

  // Draw relationship dots
  relColors.forEach(rc => {
    drawDot(rc.hue, s, rc.label, 7, `hsl(${rc.hue},${s}%,45%)`);
  });

  // Draw main color dot (on top)
  drawDot(h, s, '', 12, hex);

  // Legend
  ctx2.fillStyle = '#999';
  ctx2.font = '9px DM Mono, monospace';
  ctx2.textAlign = 'left';
  ctx2.fillText('● = current', 8, 230);
  ctx2.fillText('C=comp  T=triadic  A=analogous', 8, 240);
}

// ── SOUND EFFECTS ──
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if(!audioCtx) audioCtx = new AudioContext();
  return audioCtx;
}

function playTone(freq, type, duration, gain=0.3, fadeOut=true) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gainNode = ctx.createGain();
  osc.connect(gainNode);
  gainNode.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  gainNode.gain.setValueAtTime(gain, ctx.currentTime);
  if(fadeOut) gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration);
}

function soundCorrect() {
  // bright ascending chime
  playTone(523, 'sine', 0.15, 0.25);
  setTimeout(() => playTone(659, 'sine', 0.15, 0.25), 80);
  setTimeout(() => playTone(784, 'sine', 0.2,  0.25), 160);
}

function soundWrong() {
  // low thud
  playTone(180, 'sawtooth', 0.2, 0.2);
  setTimeout(() => playTone(150, 'sawtooth', 0.15, 0.15), 80);
}

function soundPerfect() {
  // victory fanfare
  const notes = [523, 659, 784, 1047];
  notes.forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.3, 0.3), i * 100));
  setTimeout(() => playTone(1047, 'sine', 0.5, 0.35), 450);
}

function soundStart() {
  // soft whoosh down
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gainNode = ctx.createGain();
  osc.connect(gainNode);
  gainNode.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.3);
  gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.3);
}

function soundGameOver() {
  // descending sad tones
  const notes = [392, 349, 330, 294];
  notes.forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.4, 0.2), i * 150));
}

function soundCountdown() {
  playTone(440, 'sine', 0.08, 0.15);
}

function soundHide() {
  // soft whoosh up
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gainNode = ctx.createGain();
  osc.connect(gainNode);
  gainNode.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(300, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.25);
  gainNode.gain.setValueAtTime(0.12, ctx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.25);
}

// ── Color generation
function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function hslToHex(h,s,l){
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};
  return `#${f(0)}${f(8)}${f(4)}`;
}

function getTextColor(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)/255>0.55?'rgba(0,0,0,0.6)':'rgba(255,255,255,0.6)';
}

function randomColor(){
  return hslToHex(rand(0,359), rand(30,90), rand(25,80));
}

function colorDistance(h1, h2){
  // simple hex distance
  const r1=parseInt(h1.slice(1,3),16), g1=parseInt(h1.slice(3,5),16), b1=parseInt(h1.slice(5,7),16);
  const r2=parseInt(h2.slice(1,3),16), g2=parseInt(h2.slice(3,5),16), b2=parseInt(h2.slice(5,7),16);
  return Math.sqrt((r1-r2)**2+(g1-g2)**2+(b1-b2)**2);
}

function generateDistinctColors(n, minDist=60){
  const colors=[];
  let tries=0;
  while(colors.length<n && tries<500){
    const c=randomColor();
    if(colors.every(existing=>colorDistance(c,existing)>minDist)){
      colors.push(c);
    }
    tries++;
  }
  while(colors.length<n) colors.push(randomColor());
  return colors;
}

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// Game state
let config = { colors:4, choices:12, time:3 };
let targetColors = [];
let score = 0;
let best = parseInt(localStorage.getItem('vt-memory-best')||'0');
let round = 1;
let foundColors = [];
let wrongClicks = 0;
let gamePhase = 'menu';
let roundResults = []; // track each round
const ROUNDS = 5;

document.getElementById('bestDisp').textContent = best;

document.querySelectorAll('.diff-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    config = { colors:parseInt(btn.dataset.colors), choices:parseInt(btn.dataset.choices), time:parseInt(btn.dataset.time) };
  });
});

document.getElementById('startBtn').addEventListener('click', startGame);

// ── MENU DEMO ANIMATION ──
function runMenuDemo() {
  const tilesEl = document.getElementById('demoTiles');
  const questionEl = document.getElementById('demoQuestion');
  const labelEl = document.getElementById('demoPhaseLabel');
  if(!tilesEl) return; // game started, stop demo

  const colors = generateDistinctColors(3, 70);

  // Phase 1: show colors
  labelEl.textContent = 'Memorize these colors';
  tilesEl.innerHTML = colors.map(c => {
    const tc = getTextColor(c) === 'rgba(0,0,0,0.6)' ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.5)';
    return `<div class="demo-tile" style="background:${c};"><span class="demo-tile-hex" style="color:${tc};">${c}</span></div>`;
  }).join('');
  questionEl.innerHTML = '';

  // stagger tiles in
  setTimeout(() => {
    tilesEl.querySelectorAll('.demo-tile').forEach((t,i) => {
      setTimeout(() => t.classList.add('visible'), i * 150);
    });
  }, 100);

  // Phase 2: hide colors, show ?
  setTimeout(() => {
    labelEl.textContent = 'Now find them...';
    tilesEl.querySelectorAll('.demo-tile').forEach((t,i) => {
      setTimeout(() => t.classList.add('hidden'), i * 100);
    });

    setTimeout(() => {
      tilesEl.innerHTML = '';
      questionEl.innerHTML = colors.map(() =>
        `<div class="demo-q-tile">?</div>`
      ).join('');
      questionEl.querySelectorAll('.demo-q-tile').forEach((t,i) => {
        setTimeout(() => t.classList.add('visible'), i * 100);
      });

      // Phase 3: "find" them one by one
      colors.forEach((c, i) => {
        setTimeout(() => {
          const qTiles = questionEl.querySelectorAll('.demo-q-tile');
          if(qTiles[i]) {
            qTiles[i].style.background = c;
            qTiles[i].style.borderStyle = 'solid';
            qTiles[i].style.borderColor = 'rgba(46,125,50,0.5)';
            qTiles[i].textContent = '';
            qTiles[i].classList.add('found');
          }
        }, 800 + i * 500);
      });

      // Loop
      setTimeout(() => {
        if(document.getElementById('demoTiles')) runMenuDemo();
      }, 800 + colors.length * 500 + 1200);

    }, 600);
  }, 2800);
}

setTimeout(runMenuDemo, 600);

function startGame(){
  score=0; round=1; foundColors=[]; roundResults=[];
  document.getElementById('scoreDisp').textContent=0;
  document.getElementById('roundDisp').textContent=1;
  soundStart();
  startRound();
}

function startRound(){
  gamePhase='memorize';
  targetColors = generateDistinctColors(config.colors);
  foundColors = [];
  wrongClicks = 0;
  showMemorizePhase();
}

function showMemorizePhase(){
  const main=document.getElementById('main');
  main.innerHTML=`
    <div class="phase-label">Memorize these colors</div>
    <div class="countdown" id="countdown"></div>
    <div class="color-display" id="colorDisplay"></div>
    <div class="progress-dots" id="progressDots"></div>
  `;

  // progress dots
  const dots=document.getElementById('progressDots');
  for(let i=0;i<ROUNDS;i++){
    const d=document.createElement('div');
    d.className='prog-dot'+(i<round-1?' done':i===round-1?' current':'');
    dots.appendChild(d);
  }

  // show colors with stagger
  const display=document.getElementById('colorDisplay');
  targetColors.forEach((hex,i)=>{
    const tile=document.createElement('div');
    tile.className='color-tile';
    tile.style.background=hex;
    tile.innerHTML=`<span class="tile-hex" style="color:${getTextColor(hex)};">${hex}</span>`;
    display.appendChild(tile);
    setTimeout(()=>tile.classList.add('visible'), i*120);
  });

  // countdown
  let t=config.time;
  const cdEl=document.getElementById('countdown');
  setTimeout(()=>cdEl.classList.add('visible'), targetColors.length*120+200);

  const tick=setInterval(()=>{
    const cdEl=document.getElementById('countdown');
    if(!cdEl){ clearInterval(tick); return; }
    cdEl.textContent=t;
    if(t>0) soundCountdown();
    if(t<=0){
      clearInterval(tick);
      soundHide();
      hideColors(()=>showRecallPhase());
    }
    t--;
  }, 1000);
}

function hideColors(cb){
  const tiles=document.querySelectorAll('.color-tile');
  tiles.forEach((t,i)=>{
    setTimeout(()=>{
      t.style.opacity='0';
      t.style.transform='translateY(-10px)';
    }, i*80);
  });

  const cd=document.getElementById('countdown');
  cd.classList.remove('visible');

  const display=document.getElementById('colorDisplay');
  // replace with blank tiles
  setTimeout(()=>{
    display.innerHTML='';
    targetColors.forEach(()=>{
      const tile=document.createElement('div');
      tile.className='color-tile hidden-tile';
      tile.style.background='#fff';
      tile.innerHTML=`<div style="font-size:24px;color:var(--muted);">?</div>`;
      display.appendChild(tile);
      requestAnimationFrame(()=>requestAnimationFrame(()=>tile.classList.add('visible')));
    });
    cb();
  }, targetColors.length*80+400);
}

function showRecallPhase(){
  gamePhase='recall';
  const phaseEl=document.querySelector('.phase-label');
  if(phaseEl) phaseEl.textContent=`Find the ${config.colors} colors — ${config.colors - foundColors.length} left`;

  // Generate distractor colors
  const distractors=generateDistinctColors(config.choices-config.colors, 40)
    .filter(c=>targetColors.every(t=>colorDistance(c,t)>35));

  const allChoices=shuffle([...targetColors, ...distractors.slice(0,config.choices-config.colors)]);

  // Add choice grid
  const main=document.getElementById('main');
  let grid=document.getElementById('choiceGrid');
  if(!grid){
    grid=document.createElement('div');
    grid.className='choice-grid';
    grid.id='choiceGrid';
    // adjust columns
    const cols=config.choices<=8?4:config.choices<=12?4:5;
    grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
    grid.style.maxWidth=cols<=4?'560px':'700px';
    main.appendChild(grid);
  }
  grid.innerHTML='';

  allChoices.forEach(hex=>{
    const tile=document.createElement('div');
    tile.className='choice-tile';
    tile.style.background=hex;
    tile.innerHTML=`<span class="choice-label" style="color:${getTextColor(hex)};">${hex}</span>`;
    tile.addEventListener('click',()=>handleChoice(hex,tile,allChoices));
    grid.appendChild(tile);
  });

  // result msg area
  if(!document.getElementById('resultMsg')){
    const msg=document.createElement('div');
    msg.className='result-msg';
    msg.id='resultMsg';
    main.appendChild(msg);
  }
}

function handleChoice(hex, tile, allChoices){
  if(gamePhase!=='recall') return;
  if(tile.classList.contains('correct')||tile.classList.contains('wrong')) return;

  const isTarget=targetColors.includes(hex);
  tile.classList.add('disabled');

  if(isTarget){
    tile.classList.add('correct');
    foundColors.push(hex);
    soundCorrect();

    const targetIdx = targetColors.indexOf(hex);
    const blankTiles = document.querySelectorAll('.color-tile');
    if(blankTiles[targetIdx]){
      blankTiles[targetIdx].style.background = hex;
      blankTiles[targetIdx].style.transition = 'background 0.4s ease';
      blankTiles[targetIdx].innerHTML = `<span class="tile-hex" style="color:${getTextColor(hex)};">${hex}</span>`;
      blankTiles[targetIdx].classList.remove('hidden-tile');
    }

    const remaining=config.colors-foundColors.length;
    const phaseEl=document.querySelector('.phase-label');
    if(phaseEl) phaseEl.textContent=remaining>0?`Find the ${config.colors} colors — ${remaining} left`:'';

    if(foundColors.length===config.colors){
      score+=config.colors*10;
      document.getElementById('scoreDisp').textContent=score;
      const rm=document.getElementById('resultMsg');
      if(rm) rm.textContent='Perfect!';
      soundPerfect();
      roundResults.push({ target:[...targetColors], found:[...foundColors], missed:[], wrong:wrongClicks });
      setTimeout(()=>nextRound(true),1400);
    }
  } else {
    tile.classList.add('wrong');
    score=Math.max(0,score-5);
    document.getElementById('scoreDisp').textContent=score;
    const rm=document.getElementById('resultMsg');
    if(rm) rm.textContent='Wrong color';
    wrongClicks++;
    soundWrong();
    setTimeout(()=>{ const r=document.getElementById('resultMsg'); if(r) r.textContent=''; },800);
  }
}

function nextRound(success){
  // save result if not already saved (perfect saves immediately)
  if(!success || roundResults.length < round) {
    const missed = targetColors.filter(c => !foundColors.includes(c));
    roundResults.push({ target:[...targetColors], found:[...foundColors], missed, wrong:wrongClicks });
  }
  if(round>=ROUNDS){
    endGame();
    return;
  }
  round++;
  document.getElementById('roundDisp').textContent=round;
  startRound();
}

function endGame(){
  if(score>best){
    best=score;
    localStorage.setItem('vt-memory-best',best);
    document.getElementById('bestDisp').textContent=best;
  }
  soundGameOver();

  const totalMissed = roundResults.reduce((a,r)=>a+r.missed.length,0);
  const totalFound  = roundResults.reduce((a,r)=>a+r.found.length,0);
  const totalTarget = roundResults.reduce((a,r)=>a+r.target.length,0);
  const pct = Math.round(totalFound/totalTarget*100);
  const title = pct===100 ? 'Perfect memory!' : pct>=80 ? 'Good!' : pct>=50 ? 'Keep practicing' : 'Try again';

  const reviewRows = roundResults.map((r,i)=>{
    const swatches = r.target.map(c=>{
      const found = r.found.includes(c);
      const mark = found ? '' : '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(255,255,255,0.9);">✗</div>';
      return `<div class="review-swatch" data-hex="${c}" style="width:32px;height:32px;border-radius:6px;background:${c};border:2px solid ${found?'rgba(46,125,50,0.6)':'rgba(192,57,43,0.7)'};position:relative;flex-shrink:0;cursor:pointer;transition:transform 0.12s;" onmouseover="this.style.transform='scale(1.12)'" onmouseout="this.style.transform='scale(1)'">${mark}</div>`;
    }).join('');
    const label = (r.missed.length===0 && r.wrong===0) ? '<span style="color:#2e7d32;font-weight:500;">Perfect</span>' : r.missed.length===0 ? `<span style="color:#f0a500;">${r.wrong} wrong</span>` : `<span style="color:#c0392b;">${r.found.length}/${r.target.length} (+${r.wrong||0} wrong)</span>`;
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--rule);">
      <div style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);width:56px;flex-shrink:0;">Round ${i+1}</div>
      <div style="display:flex;gap:5px;flex:1;">${swatches}</div>
      <div style="font-size:11px;flex-shrink:0;">${label}</div>
    </div>`;
  }).join('');

  const missedSwatches = roundResults.flatMap(r=>r.missed).map(c=>
    `<div class="missed-swatch" data-hex="${c}" style="display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--rule);border-radius:6px;padding:6px 10px;cursor:pointer;transition:border-color 0.12s;" onmouseover="this.style.borderColor='#111'" onmouseout="this.style.borderColor='var(--rule)'">
      <div style="width:20px;height:20px;border-radius:4px;background:${c};flex-shrink:0;"></div>
      <span style="font-size:11px;color:var(--muted);">${c}</span>
    </div>`
  ).join('');

  gamePhase='result';
  const main=document.getElementById('main');
  main.innerHTML=`
    <div style="max-width:520px;width:100%;padding:0 8px;">
      <div style="font-family:var(--serif);font-style:italic;font-size:48px;text-align:center;margin-bottom:4px;">${title}</div>
      <div style="text-align:center;font-size:13px;color:var(--muted);margin-bottom:28px;">
        ${totalFound} of ${totalTarget} colors remembered &nbsp;·&nbsp; ${pct}%
      </div>
      <div style="background:var(--surface);border:1px solid var(--rule);border-radius:12px;padding:16px 20px;margin-bottom:16px;">
        <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Round review</div>
        ${reviewRows}
      </div>
      ${totalMissed>0?`
      <div style="background:var(--surface);border:1px solid var(--rule);border-radius:12px;padding:16px 20px;margin-bottom:16px;">
        <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;">Colors you missed</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">${missedSwatches}</div>
      </div>`:''}
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;">
        <button class="diff-btn" data-colors="2" data-choices="8"  data-time="3">Easy</button>
        <button class="diff-btn" data-colors="4" data-choices="12" data-time="3">Normal</button>
        <button class="diff-btn" data-colors="5" data-choices="16" data-time="2">Hard</button>
        <button class="diff-btn" data-colors="6" data-choices="20" data-time="2">Brutal</button>
      </div>
      <div class="btn-row">
        <button class="btn" id="playAgainBtn">Play again →</button>
        <a href="index.html" class="btn secondary">Home</a>
      </div>
    </div>
  `;

  document.querySelectorAll('.diff-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      config={colors:parseInt(btn.dataset.colors),choices:parseInt(btn.dataset.choices),time:parseInt(btn.dataset.time)};
    });
  });
  document.getElementById('playAgainBtn').addEventListener('click',startGame);

  // Make all swatches clickable for color analysis
  document.querySelectorAll('.review-swatch, .missed-swatch').forEach(el => {
    el.addEventListener('click', () => showColorDetail(el.dataset.hex));
  });
}
</script>
