<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Tone</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #111;
  --paper: #f5f3ee;
  --rule: #d8d5ce;
  --muted: #999;
  --mono: 'DM Mono', monospace;
  --serif: 'Instrument Serif', serif;
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 13px;
  height: 100vh;
  display: grid;
  grid-template-columns: 300px 1fr;
  grid-template-rows: 56px 1fr;
  overflow: hidden;
}

header {
  grid-column: 1 / -1;
  border-bottom: 1px solid var(--rule);
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo { font-family: var(--serif); font-size: 20px; font-style: italic; }
.logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

aside {
  border-right: 1px solid var(--rule);
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  overflow-y: auto;
}

label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
}

textarea {
  width: 100%;
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 10px 12px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink);
  resize: none;
  line-height: 1.6;
  outline: none;
  transition: border-color 0.15s;
}
textarea:focus { border-color: var(--ink); }
textarea::placeholder { color: var(--muted); }

.run {
  width: 100%;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 3px;
  padding: 13px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s;
  margin-top: auto;
}
.run:hover { opacity: 0.8; }

.keywords-toggle {
  width: 100%;
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 7px 12px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.12s;
}
.keywords-toggle:hover { border-color: var(--ink); color: var(--ink); }

.keywords-list {
  font-size: 10px;
  color: var(--muted);
  line-height: 2;
  column-count: 2;
  margin-top: 8px;
  display: none;
}
.keywords-list.open { display: block; }

main {
  overflow-y: auto;
  padding: 24px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
  min-height: 28px;
}

.tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--rule);
  color: var(--muted);
}

.tag.matched {
  color: #fff;
  border-color: transparent;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.card {
  border: 1px solid var(--rule);
  border-radius: 3px;
  overflow: hidden;
  animation: fadeUp 0.3s ease;
  perspective: 1000px;
  cursor: pointer;
}

.card-inner {
  position: relative;
  width: 100%;
  transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

.card-front {
  width: 100%;
}

.card-back {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  transform: rotateY(180deg);
  background: var(--ink);
  color: var(--paper);
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.card-back-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 16px;
}

.card-back-fonts {
  font-size: 13px;
  color: rgba(255,255,255,0.9);
  line-height: 1.8;
  margin-bottom: 16px;
}

.card-back-css {
  font-size: 10px;
  line-height: 1.9;
  color: rgba(255,255,255,0.5);
  white-space: pre;
  overflow: hidden;
}

.card-back-css .cv { color: rgba(255,255,255,0.9); }
.card-back-css .ck { color: rgba(255,255,255,0.3); }

.card-flip-hint {
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  text-align: right;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-preview {
  height: 140px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
}

.preview-main {
  grid-column: 1;
  grid-row: 1 / 3;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  cursor: pointer;
  transition: opacity 0.12s;
}
.preview-main:hover { opacity: 0.85; }

/* Fullscreen palette preview */
.palette-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  overflow-y: auto;
  animation: fadeUp 0.25s ease;
}

.overlay-close {
  position: fixed;
  top: 20px;
  right: 28px;
  background: rgba(0,0,0,0.15);
  border: none;
  border-radius: 3px;
  padding: 8px 16px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  cursor: pointer;
  z-index: 101;
  backdrop-filter: blur(4px);
}

.preview-top { grid-column: 2; grid-row: 1; cursor: pointer; transition: opacity 0.12s; }
.preview-top:hover { opacity: 0.85; }

.preview-bot {
  grid-column: 2;
  grid-row: 2;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 5px;
}

.swatch {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
}

.card-body {
  padding: 14px 16px;
  background: var(--paper);
  border-top: 1px solid var(--rule);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.card-tag {
  font-size: 10px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--muted);
}

.reroll {
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 4px 8px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.12s;
}
.reroll:hover { border-color: var(--ink); color: var(--ink); }

.swatches-row {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}

.dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.1);
  cursor: pointer;
  position: relative;
  transition: transform 0.12s;
}
.dot:hover { transform: scale(1.2); }

/* Color detail panel */
.color-detail {
  padding: 24px;
  animation: fadeUp 0.25s ease;
}

.detail-back {
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 6px 12px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  margin-bottom: 24px;
  display: inline-block;
}
.detail-back:hover { border-color: var(--ink); color: var(--ink); }

.detail-hero {
  height: 160px;
  border-radius: 3px;
  margin-bottom: 24px;
  display: flex;
  align-items: flex-end;
  padding: 20px;
}

.detail-hex {
  font-family: var(--serif);
  font-size: 36px;
  font-style: italic;
}

.detail-hsl {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.detail-section { }

.detail-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.color-row {
  display: flex;
  gap: 4px;
  margin-bottom: 6px;
}

.color-chip {
  flex: 1;
  height: 40px;
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  transition: transform 0.1s;
}
.color-chip:hover { transform: scaleY(1.08); }
.color-chip:hover::after {
  content: attr(data-hex);
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: var(--muted);
  white-space: nowrap;
}

.shades-row {
  display: flex;
  gap: 3px;
}

.shade-chip {
  flex: 1;
  height: 32px;
  border-radius: 2px;
  cursor: pointer;
  transition: transform 0.1s;
}
.shade-chip:hover { transform: scaleY(1.1); }

.meta-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 10px;
}

.css-block {
  background: #eeebe3;
  border-radius: 3px;
  padding: 10px 12px;
  font-size: 10px;
  line-height: 1.9;
  white-space: pre;
  overflow-x: auto;
}

.ck { color: #bbb; }
.cv { color: var(--ink); }

.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
  gap: 8px;
  color: var(--muted);
}
.empty-arrow { font-family: var(--serif); font-size: 48px; font-style: italic; opacity: 0.15; }
.empty-text { font-size: 11px; letter-spacing: 0.06em; }
</style>
</head>
<body>

<header>
  <span class="logo">Visual Tone</span>
  <span class="logo-sub">helloo</span>
</header>

<aside>
  <div>
    <label>Concept</label>
    <textarea id="concept" rows="5" placeholder="cold war space race&#10;late night neon&#10;dry desert heat&#10;soviet brutalist&#10;tokyo jazz bar"></textarea>
  </div>

  <div>
    <button class="keywords-toggle" id="kwToggle">
      <span>Keywords</span>
      <span id="kwArrow">↓</span>
    </button>
    <div class="keywords-list" id="kwList"></div>
  </div>

  <button class="run" id="runBtn">Generate →</button>
</aside>

<main>
  <div class="tags" id="tags"></div>
  <div id="output">
    <div class="empty">
      <div class="empty-arrow">↗</div>
      <div class="empty-text">Enter a concept and click Generate</div>
    </div>
  </div>
</main>

const LAYOUTS   = ['strict grid','free flow','modular blocks','editorial columns','asymmetric','centered minimal'];
const DENSITIES = ['sparse','balanced','dense'];
const RADII     = ['0px','2px','4px','8px','16px'];

function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function hslToHex(h,s,l){
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{ const k=(n+h/30)%12; const c=l-a*Math.max(Math.min(k-3,9-k,1),-1); return Math.round(255*c).toString(16).padStart(2,'0'); };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function parseConcept(text){
  const words = text.toLowerCase().split(/[\s,\/\-]+/).filter(Boolean);
  const matched=[]; const unmatched=[]; const pools=[];
  words.forEach(w=>{
    // Exact match first, then startsWith, then includes — avoids "car" matching "arcade"
    const key =
      Object.keys(COLOR_MAP).find(k => k === w) ||
      Object.keys(COLOR_MAP).find(k => w.startsWith(k) && k.length >= 4) ||
      Object.keys(COLOR_MAP).find(k => k.startsWith(w) && w.length >= 4);
    if(key){ if(!matched.includes(key)){ matched.push(key); pools.push(COLOR_MAP[key]); } }
    else unmatched.push(w);
  });
  if(pools.length===0) pools.push(pick(Object.values(COLOR_MAP)));
  return {matched,unmatched,pools};
}

function generatePalette(pools){
  const pool = pick(pools);
  const colors=[];
  const used=new Set();

  for(let i=0;i<5;i++){
    let h,s,l,hex,tries=0;
    do {
      h=pick(pool.hues)+rand(-8,8);
      s=rand(pool.sat[0],pool.sat[1]);
      l=rand(pool.lit[0],pool.lit[1]);
      hex=hslToHex(h,s,l);
      tries++;
    } while(used.has(hex)&&tries<20);
    used.add(hex);
    colors.push({h,s,l,hex});
  }
  colors.sort((a,b)=>a.l-b.l);

  // Ensure enough contrast between darkest and lightest
  // If range is too narrow, push lightest up and darkest down
  const litRange = colors[4].l - colors[0].l;
  if(litRange < 25) {
    colors[4].l = Math.min(colors[4].l + 15, 97);
    colors[0].l = Math.max(colors[0].l - 15, 3);
    colors[4].hex = hslToHex(colors[4].h, colors[4].s, colors[4].l);
    colors[0].hex = hslToHex(colors[0].h, colors[0].s, colors[0].l);
  }

  return {
    bg:        colors[4].hex,
    surface:   colors[3].hex,
    highlight: colors[2].hex,
    accent:    colors[1].hex,
    text:      colors[0].hex,
    fontPair:  pick(FONT_PAIRS),
    layout:    pick(LAYOUTS),
    density:   pick(DENSITIES),
    radius:    pick(RADII),
    label:     pool.label,
  };
}

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){ h=s=0; }
  else {
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r: h=((g-b)/d+(g<b?6:0))/6; break;
      case g: h=((b-r)/d+2)/6; break;
      case b: h=((r-g)/d+4)/6; break;
    }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function hslToHex2(h,s,l){ return hslToHex(h,s,l); }

// Normalize rgb() string to hex if needed
function normalizeHex(color) {
  if(color.startsWith('#')) return color;
  // handle rgb(r,g,b)
  const m = color.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  if(m) {
    return '#' + [m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');
  }
  return color;
}

function showColorDetail(rawColor) {
  const hex = normalizeHex(rawColor);
  const [h,s,l] = hexToHsl(hex);

  // Generate color relationships
  const complementary = [hslToHex(( h+180)%360, s, l)];
  const analogous     = [hslToHex((h+30)%360,s,l), hslToHex((h+330)%360,s,l)];
  const triadic       = [hslToHex((h+120)%360,s,l), hslToHex((h+240)%360,s,l)];
  const splitComp     = [hslToHex((h+150)%360,s,l), hslToHex((h+210)%360,s,l)];
  const tetradic      = [hslToHex((h+90)%360,s,l), hslToHex((h+180)%360,s,l), hslToHex((h+270)%360,s,l)];

  // Tints (lighter) and shades (darker)
  const tints  = [10,20,30,40,50,60,70,80,90].map(lt => hslToHex(h, s, Math.min(lt+10,97)));
  const shades = [90,80,70,60,50,40,30,20,10].map(lt => hslToHex(h, s, Math.max(lt-10,3)));
  const saturations = [10,20,35,50,65,80,95].map(st => hslToHex(h, st, l));

  const textColor = l > 55 ? '#111' : '#f5f3ee';

  const out = document.getElementById('output');
  out.innerHTML = `
    <div class="color-detail">
      <button class="detail-back" id="backBtn">← Back to results</button>

        <div>

        <div class="detail-section">
          <div class="detail-label">Complementary</div>
          <div class="color-row">
            <div class="color-chip" style="background:${hex};" data-hex="${hex}"></div>

            ${analogous.map(c=>`<div class="color-chip" style="background:${c};" data-hex="${c}"></div>`).join('')}
            <div class="color-chip" style="background:${hex};" data-hex="${hex}"></div>

        <div class="detail-section">
          <div class="detail-label">Triadic</div>
          <div class="color-row">
            <div class="color-chip" style="background:${hex};" data-hex="${hex}"></div>
            ${triadic.map(c=>`<div class="color-chip" style="background:${c};" data-hex="${c}"></div>`).join('')}
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-label">Split Complementary</div>
          <div class="color-row">
            <div class="color-chip" style="background:${hex};" data-hex="${hex}"></div>
            ${splitComp.map(c=>`<div class="color-chip" style="background:${c};" data-hex="${c}"></div>`).join('')}
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-label">Tetradic</div>
          <div class="color-row">
            <div class="color-chip" style="background:${hex};" data-hex="${hex}"></div>
            ${tetradic.map(c=>`<div class="color-chip" style="background:${c};" data-hex="${c}"></div>`).join('')}
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-label">Saturation range</div>
          <div class="color-row">
            ${saturations.map(c=>`<div class="color-chip" style="background:${c};" data-hex="${c}"></div>`).join('')}
          </div>
        </div>

        <div class="detail-section" style="grid-column:1/-1;">
          <div class="detail-label">Tints → Shades</div>

            <div class="shade-chip" style="background:${hex}; outline: 2px solid #111; outline-offset:-2px;" title="${hex}"></div>
            ${shades.map(c=>`<div class="shade-chip" style="background:${c};" title="${c}"></div>`).join('')}

  document.getElementById('backBtn').addEventListener('click', () => {

function showPalettePreview(palette, concept) {

  // Decide text colors based on lightness
  const [,, bgL]  = hexToHsl(bg);
  const [,, surL] = hexToHsl(surface);
  const textOnBg  = bgL > 50 ? '#111' : '#f5f3ee';
  const textOnSur = surL > 50 ? '#111' : '#f5f3ee';
  const mutedOnBg = bgL > 50 ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.4)';
  const ruleOnBg  = bgL > 50 ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';

  const overlay = document.createElement('div');
  overlay.className = 'palette-overlay';
  overlay.style.background = bg;
  overlay.style.color = textOnBg;
  overlay.style.fontFamily = `'${fontPair.body}', sans-serif`;

  overlay.innerHTML = `
    <button class="overlay-close" id="overlayClose" style="color:#111; background:rgba(255,255,255,0.9);">✕ Close</button>

    <!-- NAV — white -->
    <div style="padding:20px 40px; border-bottom:1px solid #e0ddd8; display:flex; align-items:center; gap:16px; background:#fff;">
      <span style="font-family:'Instrument Serif',serif; font-style:italic; font-size:20px; color:#111;">Visual Tone</span>
      <span style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:#999;">${concept}</span>
    </div>

    <!-- HERO — white -->
    <div style="padding:100px 40px 80px; background:#fff; border-bottom:1px solid #e0ddd8;">
      <div style="font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#999; margin-bottom:20px;">Generated from — ${concept}</div>
      <div style="font-family:'${fontPair.heading}',serif; font-style:italic; font-size:clamp(64px,10vw,120px); line-height:0.95; color:#111; margin-bottom:36px; letter-spacing:-0.02em;">${label}</div>
      <p style="font-size:15px; color:#666; line-height:1.8; max-width:520px; margin-bottom:48px;">This is what the palette looks like in use — heading, body text, buttons, cards. Every element is using one of the five generated colors.</p>
      <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <button style="background:#111; color:#fff; border:none; padding:14px 28px; font-family:'${fontPair.body}',sans-serif; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;">Primary action</button>
        <button style="background:transparent; color:#111; border:1px solid #ccc; padding:14px 28px; font-family:'${fontPair.body}',sans-serif; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;" id="colorRelBtn">Color relationships</button>
      </div>
    </div>

    <!-- PALETTE STRIP — full bleed color -->
    <div style="display:grid; grid-template-columns:repeat(5,1fr);">
      ${[bg,surface,accent,highlight,text].map((c,i)=>{
        const [,,l2]=hexToHsl(c);
        const tc = l2>50?'rgba(0,0,0,0.75)':'rgba(255,255,255,0.75)';
        const tc2 = l2>50?'rgba(0,0,0,0.4)':'rgba(255,255,255,0.4)';
        const names=['bg','surface','accent','highlight','text'];
        return `<div style="background:${c}; padding:32px 20px 24px; aspect-ratio:3/4; display:flex; flex-direction:column; justify-content:flex-end;">
          <div style="font-size:13px; color:${tc}; font-family:'DM Mono',monospace;">${c}</div>
          <div style="font-size:10px; color:${tc2}; letter-spacing:0.08em; text-transform:uppercase; margin-top:5px;">${names[i]}</div>
        </div>`;
      }).join('')}
    </div>

    <!-- TWO COL — colored bg -->
    <div style="display:grid; grid-template-columns:2fr 1fr; border-top:1px solid ${ruleOnBg}; background:${bg};">
      <div style="padding:64px 40px; border-right:1px solid ${ruleOnBg};">
        <div style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:${mutedOnBg}; margin-bottom:24px;">Typography in context</div>
        <div style="font-family:'${fontPair.heading}',serif; font-style:italic; font-size:42px; line-height:1.15; color:${textOnBg}; margin-bottom:20px;">The heading font is<br>${fontPair.heading}</div>
        <p style="font-size:13px; line-height:1.9; color:${mutedOnBg}; margin-bottom:14px;">The body font is ${fontPair.body}. This is what a paragraph looks like at reading size — notice how the two fonts work together.</p>
        <p style="font-size:13px; line-height:1.9; color:${mutedOnBg};">A second paragraph. The muted text color creates depth while staying within the palette's hue family.</p>
      </div>
      <div style="padding:64px 32px; background:${surface}; display:flex; flex-direction:column; justify-content:space-between;">
        <div>
          <div style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:${textOnSur}; opacity:0.4; margin-bottom:12px;">Stat</div>
          <div style="font-family:'${fontPair.heading}',serif; font-style:italic; font-size:72px; color:${textOnSur}; line-height:1;">01</div>
        </div>
        <div>
          <div style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:${textOnSur}; opacity:0.4; margin-bottom:8px;">Surface block</div>
          <div style="font-size:12px; color:${textOnSur}; opacity:0.7; line-height:1.7;">This block uses the surface color.</div>
        </div>
      </div>
    </div>

    <!-- CARDS ROW — draggable carousel -->
    <div style="padding:48px 0 48px 40px; background:${bg}; border-top:1px solid ${ruleOnBg};">
      <div style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:${mutedOnBg}; margin-bottom:24px; padding-right:40px;">Cards — drag to explore</div>
      <div id="overlayCarousel" style="display:flex; gap:1px; overflow-x:auto; cursor:grab; user-select:none; padding-right:40px; padding-bottom:4px;">
        ${[surface, highlight, accent, bg, text].map((c,i) => {
          const [,,cl]=hexToHsl(c);
          const tc2 = cl>50?'#111':'#f5f3ee';
          const tm  = cl>50?'rgba(0,0,0,0.4)':'rgba(255,255,255,0.4)';
          const cardNames = ['surface','highlight','accent','bg','text'];
          return `<div style="background:${c}; padding:40px 32px; flex:0 0 280px; min-height:320px; display:flex; flex-direction:column; justify-content:space-between; transition:transform 0.2s ease;">
            <div style="font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:${tm};">0${i+1} — ${cardNames[i]}</div>
            <div>
              <div style="font-family:'${fontPair.heading}',serif; font-style:italic; font-size:28px; color:${tc2}; margin-bottom:10px; line-height:1.2;">Card title</div>
              <div style="font-size:12px; color:${tm}; line-height:1.7;">A short description using this palette color as background.</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- CSS VARS — white -->
    <div style="padding:48px 40px; background:#fff; border-top:1px solid #e0ddd8;">
      <div style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:#999; margin-bottom:16px;">CSS Variables</div>
      <div style="background:#f5f3ee; padding:20px 24px; font-size:11px; line-height:2.2; font-family:'DM Mono',monospace; border:1px solid #e0ddd8;">
        ${[['--color-bg',bg],['--color-surface',surface],['--color-accent',accent],['--color-highlight',highlight],['--color-text',text],['--font-heading',`'${fontPair.heading}', serif`],['--font-body',`'${fontPair.body}', sans-serif`]].map(([k,v])=>`<div><span style="color:#bbb;">${k}:</span> <span style="color:#111;">${v};</span></div>`).join('')}
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
  document.getElementById('overlayClose').addEventListener('click', () => overlay.remove());

  // Drag to scroll carousel
  const carousel = document.getElementById('overlayCarousel');
  let isDown = false, startX, scrollLeft;
  carousel.addEventListener('mousedown', e => {
    isDown = true;
    startX = e.pageX - carousel.offsetLeft;
    scrollLeft = carousel.scrollLeft;
    carousel.style.cursor = 'grabbing';
  });
  carousel.addEventListener('mouseleave', () => { isDown = false; carousel.style.cursor = 'grab'; });
  carousel.addEventListener('mouseup',    () => { isDown = false; carousel.style.cursor = 'grab'; });
  carousel.addEventListener('mousemove',  e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - carousel.offsetLeft;
    carousel.scrollLeft = scrollLeft - (x - startX) * 1.5;
  });

  document.getElementById('colorRelBtn').addEventListener('click', () => {
    const colors = [bg, surface, accent, highlight, text];
    const names  = ['bg','surface','accent','highlight','text'];

    const relOverlay = document.createElement('div');
    relOverlay.className = 'palette-overlay';
    relOverlay.style.background = '#f5f3ee';
    relOverlay.style.color = '#111';
    relOverlay.style.fontFamily = `'DM Mono', monospace`;

    relOverlay.innerHTML = `
      <button class="overlay-close" id="relClose" style="color:#111;">✕ Close</button>

      <div style="padding:20px 40px; border-bottom:1px solid #d8d5ce;">
        <span style="font-family:'Instrument Serif',serif; font-style:italic; font-size:20px; color:#111;">Color Relationships</span>
        <span style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:#999; margin-left:16px;">${concept}</span>
      </div>

      <div style="padding:40px;">
        ${colors.map((c, ci) => {
          const [h,s,l] = hexToHsl(c);

          const complementary = hslToHex((h+180)%360, s, l);
          const analogous     = [hslToHex((h+30)%360,s,l), hslToHex((h+330)%360,s,l)];
          const triadic       = [hslToHex((h+120)%360,s,l), hslToHex((h+240)%360,s,l)];
          const splitComp     = [hslToHex((h+150)%360,s,l), hslToHex((h+210)%360,s,l)];
          const shades        = [90,78,66,54,42,30,18,6].map(lt => hslToHex(h, s, lt));

          return `
          <div style="margin-bottom:48px; padding-bottom:48px; border-bottom:1px solid #d8d5ce;">

            <div style="display:flex; align-items:center; gap:16px; margin-bottom:24px;">
              <div style="width:48px; height:48px; border-radius:50%; background:${c}; border:1px solid rgba(0,0,0,0.08);"></div>
              <div>
                <div style="font-size:18px; color:#111;">${c}</div>
                <div style="font-size:10px; color:#999; letter-spacing:0.08em; text-transform:uppercase; margin-top:3px;">${names[ci]} · hsl(${h}, ${s}%, ${l}%)</div>
              </div>
            </div>

            <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:16px;">

              <div>
                <div style="font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#999; margin-bottom:8px;">Complementary</div>
                <div style="display:flex; gap:3px;">
                  <div style="flex:1; height:48px; background:${c}; border-radius:2px;"></div>
                  <div style="flex:1; height:48px; background:${complementary}; border-radius:2px;"></div>
                </div>
              </div>

              <div>
                <div style="font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#999; margin-bottom:8px;">Analogous</div>
                <div style="display:flex; gap:3px;">
                  ${analogous.map(ac=>`<div style="flex:1; height:48px; background:${ac}; border-radius:2px;"></div>`).join('')}
                  <div style="flex:1; height:48px; background:${c}; border-radius:2px;"></div>
                </div>
              </div>

              <div>
                <div style="font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#999; margin-bottom:8px;">Triadic</div>
                <div style="display:flex; gap:3px;">
                  <div style="flex:1; height:48px; background:${c}; border-radius:2px;"></div>
                  ${triadic.map(tc2=>`<div style="flex:1; height:48px; background:${tc2}; border-radius:2px;"></div>`).join('')}
                </div>
              </div>

              <div>
                <div style="font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#999; margin-bottom:8px;">Split Comp.</div>
                <div style="display:flex; gap:3px;">
                  <div style="flex:1; height:48px; background:${c}; border-radius:2px;"></div>
                  ${splitComp.map(sc=>`<div style="flex:1; height:48px; background:${sc}; border-radius:2px;"></div>`).join('')}
                </div>
              </div>

              <div style="grid-column:1/-1;">
                <div style="font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#999; margin-bottom:8px;">Tints → Shades</div>
                <div style="display:flex; gap:2px;">
                  ${shades.map(sc=>`<div style="flex:1; height:36px; background:${sc}; border-radius:2px;"></div>`).join('')}
                </div>
              </div>

            </div>
          </div>`;
        }).join('')}
      </div>
    `;

    document.body.appendChild(relOverlay);
    document.getElementById('relClose').addEventListener('click', () => relOverlay.remove());
  });
}

function run(){
  const concept = document.getElementById('concept').value.trim();
  if(!concept) return;

  const {matched,unmatched,pools} = parseConcept(concept);

  const tagsEl = document.getElementById('tags');
  tagsEl.innerHTML = '';
  matched.forEach(w=>{
    const p = COLOR_MAP[w];
    const bg = hslToHex(pick(p.hues), rand(p.sat[0],p.sat[1]), rand(35,55));
    const t = document.createElement('span');
    t.className='tag matched';
    t.style.background=bg;
    t.textContent=`${w} → ${p.label}`;
    tagsEl.appendChild(t);
  });
  unmatched.forEach(w=>{
    const t=document.createElement('span');
    t.className='tag';
    t.textContent=`${w} (unrecognized)`;
    tagsEl.appendChild(t);
  });

  const out = document.getElementById('output');
  out.innerHTML = '<div class="cards-grid" id="grid"></div>';
  const grid = document.getElementById('grid');

  for(let i=0;i<4;i++){
    grid.appendChild(buildCard(generatePalette(pools), concept, i+1, pools));
  }

  currentOutputHTML = out.innerHTML;

  // Re-attach dot listeners after render
  document.querySelectorAll('.dot').forEach(dot => {
    dot.addEventListener('click', () => showColorDetail(dot.style.background));
  });
}

document.getElementById('runBtn').addEventListener('click', run);
document.getElementById('concept').addEventListener('keydown', e=>{
  if(e.key==='Enter'&&e.metaKey) run();
});

// Keywords list + toggle
const kwList = document.getElementById('kwList');
kwList.innerHTML = Object.keys(COLOR_MAP).join('<br>');

document.getElementById('kwToggle').addEventListener('click', () => {
  kwList.classList.toggle('open');
  document.getElementById('kwArrow').textContent = kwList.classList.contains('open') ? '↑' : '↓';
});
</script>
</body>
</html>
