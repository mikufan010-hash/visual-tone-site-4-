<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Gallery — Visual Tone</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #111; --paper: #f5f3ee; --rule: #d8d5ce; --muted: #999;
  --mono: 'DM Mono', monospace; --serif: 'Instrument Serif', serif;
}
body { background: var(--paper); color: var(--ink); font-family: var(--mono); font-size: 13px; min-height: 100vh; display: flex; flex-direction: column; }
header { border-bottom: 1px solid var(--rule); padding: 20px 40px; display: flex; align-items: baseline; justify-content: space-between; }
.header-left { display: flex; align-items: baseline; gap: 16px; }
.logo { font-family: var(--serif); font-size: 22px; font-style: italic; text-decoration: none; color: var(--ink); }
.logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.back { font-size: 11px; color: var(--muted); text-decoration: none; letter-spacing: 0.06em; }
.back:hover { color: var(--ink); }
.page-title { padding: 40px 40px 24px; display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--rule); }
.page-title h1 { font-family: var(--serif); font-size: 32px; font-style: italic; font-weight: 400; }
.count { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
main { flex: 1; padding: 32px 40px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; border: 1px solid var(--rule); }
.card { background: var(--paper); text-decoration: none; color: var(--ink); display: block; transition: background 0.15s; }
.card:hover { background: #eeecea; }
.card-thumb { width: 100%; aspect-ratio: 4/3; overflow: hidden; border-bottom: 1px solid var(--rule); }
.card-thumb iframe { width: 200%; height: 200%; transform: scale(0.5); transform-origin: top left; pointer-events: none; border: none; }
.card-body { padding: 16px 20px; }
.card-concept { font-size: 10px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 5px; }
.card-title { font-family: var(--serif); font-size: 18px; font-style: italic; margin-bottom: 8px; }
.card-swatches { display: flex; gap: 4px; margin-bottom: 10px; }
.swatch { width: 14px; height: 14px; border-radius: 50%; border: 0.5px solid rgba(0,0,0,0.08); }
.card-meta { font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; }
footer { border-top: 1px solid var(--rule); padding: 16px 40px; font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }
</style>
</head>
<body>

<header>

    <a class="logo" href="index.html">Visual Tone</a>
